<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto-Pointing Presentation</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
/* =====================================================
   CSS変数・リセット
===================================================== */
:root {
  --bg:          #0d0f14;
  --surface:     #161922;
  --surface2:    #1e2330;
  --border:      #2a3040;
  --accent:      #4f9eff;
  --accent2:     #ff4f6a;
  --text:        #e8ecf4;
  --text-muted:  #6b7a94;
  --laser:       #ff3a3a;
  --laser-glow:  rgba(255, 58, 58, 0.35);
  --highlight:   rgba(255, 220, 40, 0.22);
  --border-clr:  rgba(255, 58, 58, 0.85);
  --radius:      10px;
  --font-mono:   'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
  --font-ui:     'Noto Sans JP', 'Hiragino Sans', sans-serif;
  --transition:  0.28s cubic-bezier(0.4, 0, 0.2, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: grid;
  grid-template-rows: 48px 1fr 52px;
  grid-template-columns: 1fr 320px;
  grid-template-areas:
    "header header"
    "stage  panel"
    "footer footer";
  overflow: hidden;
}

/* =====================================================
   ヘッダー
===================================================== */
header {
  grid-area: header;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
}

.logo {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--accent);
  font-family: var(--font-mono);
}

.logo span { color: var(--accent2); }

#conn-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text-muted);
  margin-left: auto;
}

.conn-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #444;
  transition: background var(--transition);
}
.conn-dot.connected { background: #3ddc84; box-shadow: 0 0 6px #3ddc84; }
.conn-dot.error     { background: var(--accent2); }

/* =====================================================
   ステージ（スライド表示エリア）
===================================================== */
#stage {
  grid-area: stage;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #090b10;
  padding: 24px;
  overflow: hidden;
  position: relative;
}

#slide-container {
  position: relative;
  /* サイズはJSで動的設定 */
  max-width: 100%;
  max-height: 100%;
  border-radius: 6px;
  overflow: hidden;
  box-shadow: 0 8px 48px rgba(0,0,0,0.6);
}

#slide-img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: contain;
  border-radius: 6px;
}

/* ASRプロンプト生成待機オーバーレイ（stage全体を覆う） */
#asr-wait-overlay {
  position: absolute;
  inset: 0;
  background: rgba(13, 15, 20, 0.88);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 20;
  backdrop-filter: blur(4px);
  transition: opacity 0.5s ease;
  pointer-events: all;
}
#asr-wait-overlay.hidden {
  opacity: 0;
  pointer-events: none;
}
.wait-spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.wait-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  font-family: var(--font-mono);
}
.wait-sub {
  font-size: 11px;
  color: var(--text-muted);
  font-family: var(--font-mono);
}
.wait-progress-bar {
  width: 200px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.wait-progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  width: 0%;
  transition: width 0.4s ease;
}

/* SVGオーバーレイ（ポインター描画用） */
#pointer-overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: visible;
}

/* レーザーポインター — 信頼度クラスで色を切り替え */
.laser-core {
  fill: var(--ptr-color, var(--laser));
  opacity: 0.92;
  filter: drop-shadow(0 0 6px var(--ptr-color, var(--laser)));
}
.laser-mid {
  fill: var(--ptr-color, var(--laser));
  opacity: 0.35;
}
.laser-outer {
  fill: var(--ptr-color, var(--laser));
  opacity: 0.12;
}

/* ハイライト矩形 */
.highlight-rect {
  fill: var(--ptr-highlight, var(--highlight));
  rx: 4;
}

/* ボーダー矩形 */
.border-rect {
  fill: none;
  stroke: var(--ptr-color, var(--border-clr));
  stroke-width: 3;
  rx: 4;
  filter: drop-shadow(0 0 4px var(--ptr-shadow, rgba(255,58,58,0.5)));
}

/* ポインターアニメーション */
#pointer-group {
  transition: opacity 0.2s ease;
}

/* 出現: スケールイン + フェードイン（transform-origin はSVG中心でなく要素中心にしたいため
   JS側で transform-box を使用） */
.pointer-appear {
  animation: pointerAppear 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes pointerAppear {
  from { opacity: 0; transform: scale(0.5); }
  to   { opacity: 1; transform: scale(1); }
}

/* フェードアウト: clearPointer() でクラスを付与 */
.pointer-fadeout {
  animation: pointerFadeout 0.3s ease-out forwards;
}

@keyframes pointerFadeout {
  from { opacity: 1; transform: scale(1); }
  to   { opacity: 0; transform: scale(0.8); }
}

/* 到達後パルス（止まったときに点滅） */
.pointer-pulse .laser-core {
  animation: laserPulse 1.8s ease-in-out infinite;
}
.pointer-pulse .laser-mid {
  animation: laserPulse 1.8s ease-in-out infinite 0.1s;
}
.pointer-pulse .laser-outer {
  animation: laserPulse 1.8s ease-in-out infinite 0.2s;
}

@keyframes laserPulse {
  0%, 100% { opacity: 0.92; transform: scale(1); }
  50%       { opacity: 0.5;  transform: scale(0.85); }
}

/* ラベル */
.pointer-label {
  font-size: 11px;
  font-family: var(--font-mono);
  fill: white;
}
.pointer-label-bg {
  fill: var(--ptr-color, var(--laser));
  opacity: 0.88;
  rx: 3;
}
#chart-annotation {
  pointer-events: none;
}
/* スライドなし状態 */
#no-slide {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  color: var(--text-muted);
  font-size: 13px;
}
#no-slide svg { opacity: 0.3; }

/* =====================================================
   サイドパネル
===================================================== */
#panel {
  grid-area: panel;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-section {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}

.panel-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
  font-family: var(--font-mono);
}

/* スライドナビゲーション */
.slide-nav {
  display: flex;
  align-items: center;
  gap: 10px;
}

.nav-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: var(--radius);
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all var(--transition);
  font-size: 14px;
}
.nav-btn:hover { background: var(--accent); border-color: var(--accent); }
.nav-btn:active { transform: scale(0.95); }

#slide-indicator {
  flex: 1;
  text-align: center;
  font-size: 13px;
  font-family: var(--font-mono);
  color: var(--text-muted);
}
#slide-indicator strong { color: var(--text); font-size: 15px; }

/* ASR入力エリア */
.asr-input-wrap {
  display: flex;
  gap: 8px;
}

#asr-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 12px;
  padding: 8px 12px;
  font-family: var(--font-ui);
  outline: none;
  transition: border-color var(--transition);
  resize: none;
  height: 64px;
}
#asr-input:focus { border-color: var(--accent); }
#asr-input::placeholder { color: var(--text-muted); }

.send-btn {
  background: var(--accent);
  border: none;
  border-radius: var(--radius);
  color: white;
  font-size: 11px;
  font-weight: 600;
  padding: 0 12px;
  cursor: pointer;
  transition: all var(--transition);
  letter-spacing: 0.04em;
  white-space: nowrap;
  align-self: flex-end;
  height: 32px;
}
.send-btn:hover  { background: #3a8ef0; transform: translateY(-1px); }
.send-btn:active { transform: scale(0.97); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* マイクボタン */
.mic-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 8px;
}

#btn-mic {
  display: flex;
  align-items: center;
  gap: 7px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 600;
  padding: 0 14px;
  height: 34px;
  cursor: pointer;
  transition: all var(--transition);
  font-family: var(--font-mono);
  letter-spacing: 0.04em;
}
#btn-mic:hover { border-color: var(--accent); color: var(--accent); }
#btn-mic.active {
  background: rgba(255, 58, 58, 0.12);
  border-color: var(--laser);
  color: var(--laser);
  animation: micPulse 1.4s ease-in-out infinite;
}
#btn-mic.disabled { opacity: 0.3; cursor: not-allowed; }

@keyframes micPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255, 58, 58, 0); }
  50%       { box-shadow: 0 0 0 4px rgba(255, 58, 58, 0.2); }
}

.mic-icon { font-size: 14px; }

/* 字幕エリア */
#transcript-box {
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-muted);
  padding: 4px 0 0;
  min-height: 18px;
  transition: color var(--transition);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
#transcript-box.fresh { color: var(--accent); }

/* ステータス */
#status-bar {
  font-size: 12px;
  padding: 8px 0 4px;
  color: var(--accent);
  font-family: var(--font-mono);
  min-height: 28px;
  transition: color var(--transition);
}
#status-bar.error { color: var(--accent2); }

/* ログ */
#log-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
#log-list::-webkit-scrollbar { width: 4px; }
#log-list::-webkit-scrollbar-track { background: transparent; }
#log-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.log-entry {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 10px;
  font-size: 11px;
  line-height: 1.5;
  animation: slideIn 0.2s ease-out;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.log-entry.none { border-color: #2a3040; opacity: 0.6; }
.log-entry.high { border-left: 3px solid #3ddc84; }
.log-entry.medium { border-left: 3px solid #ffd740; }
.log-entry.low { border-left: 3px solid #ff9800; }

.log-text  { color: var(--text-muted); font-size: 10px; margin-bottom: 2px; }
.log-result { color: var(--text); font-family: var(--font-mono); }
.log-reason { color: var(--text-muted); font-size: 10px; margin-top: 3px; font-style: italic; }

.conf-badge {
  display: inline-block;
  font-size: 9px;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 3px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-left: 4px;
}
.conf-high   { background: #3ddc8422; color: #3ddc84; }
.conf-medium { background: #ffd74022; color: #ffd740; }
.conf-low    { background: #ff980022; color: #ff9800; }
.conf-none   { background: #44444422; color: #888; }

/* 精度評価ボタン */
.eval-row {
  display: flex;
  gap: 5px;
  margin-top: 5px;
}
.eval-btn {
  flex: 1;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 0;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
  font-family: var(--font-mono);
  letter-spacing: 0.04em;
}
.eval-btn:hover { transform: translateY(-1px); }
.eval-btn.correct {
  background: #3ddc8422;
  border-color: #3ddc84;
  color: #3ddc84;
}
.eval-btn.wrong {
  background: #ff4f6a22;
  border-color: #ff4f6a;
  color: #ff4f6a;
}
.eval-btn.selected-correct {
  background: #3ddc84;
  border-color: #3ddc84;
  color: #000;
}
.eval-btn.selected-wrong {
  background: #ff4f6a;
  border-color: #ff4f6a;
  color: #fff;
}

/* 精度サマリー */
#accuracy-bar {
  padding: 8px 16px;
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
#accuracy-score {
  font-size: 16px;
  font-weight: 700;
  color: var(--accent);
}
.acc-detail { font-size: 10px; }

/* =====================================================
   PPTXアップロードパネル
===================================================== */
#pptx-upload-panel {
  padding: 16px;
  border-bottom: 2px solid var(--accent);
  display: block;
  background: rgba(79, 158, 255, 0.05);
}
#pptx-upload-panel.hidden { display: none; }

.upload-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 20px 12px;
  text-align: center;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
}
.upload-zone:hover,
.upload-zone.dragover {
  border-color: var(--accent);
  background: rgba(79, 158, 255, 0.06);
}
.upload-zone input[type="file"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  width: 100%;
  height: 100%;
}
.upload-icon { font-size: 28px; margin-bottom: 6px; }
.upload-label {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.5;
}
.upload-label strong { color: var(--accent); }

#upload-progress {
  margin-top: 10px;
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-muted);
}
.progress-bar {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 6px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  width: 0%;
  transition: width 0.3s ease;
}
.progress-fill.error { background: var(--accent2); }
.progress-fill.done  { background: #3ddc84; }

/* =====================================================
   フッター
===================================================== */
footer {
  grid-area: footer;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  font-size: 11px;
  color: var(--text-muted);
}

.kbd {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 6px;
  font-family: var(--font-mono);
  font-size: 10px;
}

#timing-info { margin-left: auto; font-family: var(--font-mono); }

/* =====================================================
   フォーカスモード（パネル非表示・スライド全幅）
===================================================== */
body.focus-mode {
  grid-template-columns: 1fr 0;
}
body.focus-mode #panel {
  display: none;
}
body.focus-mode #btn-focus span.icon-expand { display: none; }
body.focus-mode #btn-focus span.icon-collapse { display: inline; }
#btn-focus span.icon-collapse { display: none; }

/* =====================================================
   ローディング
===================================================== */
.pulse {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 1s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.3; transform: scale(0.8); }
  50%       { opacity: 1; transform: scale(1.2); }
}
</style>
</head>
<body>

<!-- ヘッダー -->
<header>
  <div class="logo">Auto<span>·</span>Pointer</div>
  <div id="conn-status">
    <div class="conn-dot" id="conn-dot"></div>
    <span id="conn-label">接続中...</span>
  </div>
</header>

<!-- スライドステージ -->
<main id="stage">
  <div id="no-slide">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
    </svg>
    <span>スライドを読み込んでいます...</span>
  </div>

  <!-- ASRプロンプト生成待機オーバーレイ（stage直下） -->
  <div id="asr-wait-overlay" class="hidden">
    <div class="wait-spinner"></div>
    <div class="wait-title">ASR認識準備中...</div>
    <div class="wait-progress-bar">
      <div class="wait-progress-fill" id="wait-progress-fill"></div>
    </div>
    <div class="wait-sub" id="wait-progress-text">スライドの専門用語を学習しています</div>
  </div>

  <div id="slide-container" style="display:none">
    <img id="slide-img" alt="スライド" draggable="false">
    <svg id="pointer-overlay" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <!-- ポインター要素はJSで動的生成 -->
    </svg>
  </div>
</main>

<!-- サイドパネル -->
<aside id="panel">

  <!-- PPTXアップロード -->
  <div id="pptx-upload-panel">
    <div class="panel-label">プレゼンテーションファイル</div>
    <div class="upload-zone" id="upload-zone">
      <input type="file" id="pptx-file-input" accept=".pptx">
      <div class="upload-icon">📂</div>
      <div class="upload-label">
        <strong>クリック</strong>またはドラッグ&ドロップ<br>
        .pptx ファイルを選択
      </div>
    </div>
    <div id="upload-progress" style="display:none">
      <span id="upload-message">処理中...</span>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>
  </div>

  <!-- スライドナビ -->
  <div class="panel-section">
    <div class="panel-label">スライド</div>
    <div class="slide-nav">
      <button class="nav-btn" id="btn-prev" title="前のスライド (←)">‹</button>
      <div id="slide-indicator">
        <strong id="cur-slide">-</strong> / <span id="total-slides">-</span>
      </div>
      <button class="nav-btn" id="btn-next" title="次のスライド (→)">›</button>
    </div>
  </div>

  <!-- ASR手動入力 -->
  <div class="panel-section">
    <div class="panel-label">発話テキスト入力（テスト用）</div>
    <div class="asr-input-wrap">
      <textarea id="asr-input" placeholder="発話テキストを入力して送信&#10;（Enter で送信）"></textarea>
      <button class="send-btn" id="btn-send">送信</button>
    </div>
    <div id="status-bar">待機中</div>

    <!-- マイクASRコントロール -->
    <div class="mic-row">
      <button id="btn-mic" title="マイクASR ON/OFF">
        <span class="mic-icon">🎤</span>
        <span id="mic-label">ASR 無効</span>
      </button>
    </div>
    <div id="transcript-box">—</div>
  </div>

  <!-- 精度サマリー -->
  <div id="accuracy-bar">
    <span id="accuracy-score">—</span>
    <span class="acc-detail" id="accuracy-detail">評価待ち（✓/✗ で記録）</span>
  </div>

  <!-- ログ -->
  <div class="panel-label" style="padding: 12px 16px 4px; font-size:10px; color:var(--text-muted);">
    POINTING LOG
  </div>
  <div id="log-list"></div>

</aside>

<!-- フッター -->
<footer>
  <span><span class="kbd">←</span><span class="kbd">→</span> スライド切替</span>
  <span><span class="kbd">Enter</span> テキスト送信</span>
  <span><span class="kbd">F</span> 全画面</span>
  <span id="timing-info"></span>
  <button id="btn-fullscreen" style="background:var(--surface2); border:1px solid var(--border); color:var(--text-muted); border-radius:6px; padding:4px 12px; font-size:11px; font-family:var(--font-mono); cursor:pointer; transition:all 0.2s;" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-muted)'">
    ⛶ 全画面
  </button>
  <button id="btn-focus" title="スライド全幅表示 (F)" style="background:var(--surface2); border:1px solid var(--border); color:var(--text-muted); border-radius:6px; padding:4px 12px; font-size:11px; font-family:var(--font-mono); cursor:pointer; transition:all 0.2s;" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-muted)'">
    <span class="icon-expand">⛶ 全幅表示</span>
    <span class="icon-collapse">✕ 元に戻す</span>
  </button>
  <button id="btn-export-csv" style="margin-left:auto; background:var(--surface2); border:1px solid var(--border); color:var(--text-muted); border-radius:6px; padding:4px 12px; font-size:11px; font-family:var(--font-mono); cursor:pointer; transition:all 0.2s;" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-muted)'">
    ⬇ 精度CSV
  </button>
</footer>

<script>
// =====================================================
// 定数・状態
// =====================================================
const SERVER_URL   = window.location.origin;
const MAX_LOG      = 30;

// =====================================================
// 精度評価データ
// =====================================================
let evalRecords = [];   // { id, text, elemId, preview, conf, slide, correct, timestamp }
let evalCounter = 0;

let socket;
let currentSlide   = 1;
let totalSlides    = 1;
let slideWidthPt   = 720;
let slideHeightPt  = 540;
let isProcessing   = false;

// ポインターの「現在位置」（比率、スムーズ移動用）
let pointerTarget  = null;  // { cx, cy, rx, ry, rw, rh } (比率)
let pointerCurrent = null;
let rafId          = null;
let pulseTimerId   = null;  // 到達後パルス開始タイマー
let fadeTimerId    = null;  // フェードアウトタイマー

// lerp速度: 距離が大きいと速く、小さいと遅い（自然な人間の動きに近い）
const LERP_MIN  = 0.08;   // 近距離（滑らか）
const LERP_MAX  = 0.22;   // 遠距離（素早く追従）
const DIST_FAR  = 0.30;   // この距離以上ならLERP_MAX

// 信頼度 → 色マッピング
const CONF_COLOR = {
  high:   { laser: '#ff3a3a', highlight: 'rgba(255,220,40,0.22)', shadow: 'rgba(255,58,58,0.5)' },
  medium: { laser: '#ff8c00', highlight: 'rgba(255,160,0,0.18)',  shadow: 'rgba(255,140,0,0.45)' },
  low:    { laser: '#ffd700', highlight: 'rgba(255,215,0,0.15)',  shadow: 'rgba(255,215,0,0.4)' },
};

// =====================================================
// DOM参照
// =====================================================
const stageEl      = document.getElementById('stage');
const containerEl  = document.getElementById('slide-container');
const imgEl        = document.getElementById('slide-img');
const overlayEl    = document.getElementById('pointer-overlay');
const noSlideEl    = document.getElementById('no-slide');
const logListEl    = document.getElementById('log-list');
const statusEl     = document.getElementById('status-bar');
const asrInputEl   = document.getElementById('asr-input');
const btnSend      = document.getElementById('btn-send');
const btnPrev      = document.getElementById('btn-prev');
const btnNext      = document.getElementById('btn-next');
const curSlideEl   = document.getElementById('cur-slide');
const totalEl      = document.getElementById('total-slides');
const timingEl     = document.getElementById('timing-info');
const connDot      = document.getElementById('conn-dot');
const connLabel    = document.getElementById('conn-label');
const btnMic       = document.getElementById('btn-mic');
const micLabel     = document.getElementById('mic-label');
const transcriptEl  = document.getElementById('transcript-box');
const uploadPanel   = document.getElementById('pptx-upload-panel');
const uploadZone    = document.getElementById('upload-zone');
const fileInput     = document.getElementById('pptx-file-input');
const uploadProgress = document.getElementById('upload-progress');
const uploadMessage = document.getElementById('upload-message');
const progressFill  = document.getElementById('progress-fill');
const asrWaitOverlay  = document.getElementById('asr-wait-overlay');
const waitProgressFill = document.getElementById('wait-progress-fill');
const waitProgressText = document.getElementById('wait-progress-text');

// --- ASR状態 ---
let micEnabled  = false;   // サーバーが --asr で起動しているか
let micActive   = false;   // 現在マイク収録中か
let transcriptTimer = null;

// --- ブラウザASR（音声ストリーミング）---
let browserAudioCtx    = null;
let browserMediaStream = null;
let browserProcessor   = null;
let browserMicActive   = false;
const BROWSER_ASR_CHUNK_SEC = 3;   // 何秒ごとにサーバーに送るか
let browserAudioBuffer = [];       // Float32Arrayのチャンクを蓄積
let browserChunkTimer  = null;

// =====================================================
// Socket.IO 接続
// =====================================================
function connectSocket() {
  socket = io(SERVER_URL, {
    path: '/socket.io',
    transports: ['websocket', 'polling'],
  });

  socket.on('connect', () => {
    connDot.className   = 'conn-dot connected';
    connLabel.textContent = 'サーバー接続済み';
    console.log('[WS] 接続完了:', socket.id);
    // ASRサーバーの状態を確認してマイクボタンを初期化
    checkAsrStatus();
  });

  socket.on('disconnect', () => {
    connDot.className   = 'conn-dot error';
    connLabel.textContent = '切断（再接続中...）';
  });

  // ASRプロンプト生成進捗
  socket.on('asr_prompt_progress', (data) => {
    const pct = Math.round(data.done / data.total * 100);
    if (waitProgressFill) waitProgressFill.style.width = `${pct}%`;
    if (waitProgressText) waitProgressText.textContent =
      `スライドの専門用語を学習中... ${data.done}/${data.total}`;
  });

  // ASRプロンプト生成完了 → オーバーレイを消して入力を有効化
  socket.on('asr_prompt_ready', (data) => {
    if (asrWaitOverlay) {
      asrWaitOverlay.classList.add('hidden');
    }
    setInputEnabled(true);
    setStatus('✅ ASR準備完了 - 発話を開始してください');
  });

  socket.on('pptx_progress', (data) => {
    showUploadProgress(data.state, data.message, data.progress);
  });

  socket.on('slides_loaded', (data) => {
    totalSlides   = data.total;
    slideWidthPt  = data.slide_width_pt  || 720;
    slideHeightPt = data.slide_height_pt || 540;
    totalEl.textContent = totalSlides;
    // スライド1を表示してからパネルを閉じる
    loadSlideImage(1);
    clearPointer(true);
    setTimeout(() => {
      uploadPanel.classList.add('hidden');
    }, 1500);
    // ASRプロンプト生成中はオーバーレイを表示して入力を無効化
    if (asrWaitOverlay) {
      asrWaitOverlay.classList.remove('hidden');
      if (waitProgressFill) waitProgressFill.style.width = '0%';
      if (waitProgressText) waitProgressText.textContent = 'スライドの専門用語を学習しています...';
    }
    setInputEnabled(false);
  });

  socket.on('slide_changed', (data) => {
    currentSlide = data.slide_num;
    curSlideEl.textContent = currentSlide;
    // スライド未ロード状態では画像取得しない
    if (totalSlides > 0) {
      loadSlideImage(currentSlide);
      clearPointer(true);
    }
  });

  socket.on('pointing_result', (data) => {
    const t0 = performance.now();
    isProcessing = false;
    updateSendBtn();
    handlePointingResult(data);
    const elapsed = performance.now() - t0;
    timingEl.textContent = `描画: ${elapsed.toFixed(1)}ms`;
  });

  socket.on('status', (data) => {
    setStatus(data.message, false);
  });

  socket.on('error', (data) => {
    isProcessing = false;
    updateSendBtn();
    setStatus('⚠ ' + data.message, true);
  });

  // ASR字幕
  socket.on('asr_transcript', (data) => {
    showTranscript(data.text);
  });

  // ASR稼働状態
  socket.on('asr_status', (data) => {
    micActive = data.running;
    updateMicBtn();
  });

  // タイミング計測結果
  socket.on('timing', (data) => {
    timingEl.textContent =
      `ASR:${data.asr_sec}s | LLM:${data.llm_sec}s | Total:${data.total_sec}s`;
  });

  
  socket.on('chart_pointing_result', (data) => {
    console.log('[CHART_POINTING] data.slide_num=', data.slide_num, typeof data.slide_num, 
                'currentSlide=', currentSlide, typeof currentSlide);
    if (data.slide_num !== currentSlide) {
      console.log('[CHART_POINTING] スキップ');
      return;
    }
    if (data.draw_type && data.draw_type !== 'none') {
      drawChartAnnotation(data);
    }
  });
}

// =====================================================
// スライド読み込み
// =====================================================
async function loadSlideList() {
  try {
    const res = await fetch('/api/slides');
    if (!res.ok) throw new Error(res.statusText);
    const data = await res.json();
    totalSlides   = data.total;
    slideWidthPt  = data.slide_width_pt  || 720;
    slideHeightPt = data.slide_height_pt || 540;
    totalEl.textContent = totalSlides;
    console.log(`[INFO] スライド数: ${totalSlides}, サイズ: ${slideWidthPt}×${slideHeightPt}pt`);
    // スライドが既にロード済みならアップロードパネルを非表示に
    if (totalSlides > 0) {
      uploadPanel.classList.add('hidden');
      loadSlideImage(1);
      // --pptx起動時はプロンプト生成完了イベントが来ないのでそのまま有効
      setInputEnabled(true);
    }
  } catch (e) {
    // スライード未ロード状態（--pptxなし起動）→ アップロードパネルを表示
    uploadPanel.classList.remove('hidden');
    console.log('[INFO] スライド未ロード → アップロードパネルを表示');
  }
}

function loadSlideImage(n) {
  const url = `/api/slide/${n}/image?t=${Date.now()}`;
  imgEl.onload = () => {
    noSlideEl.style.display   = 'none';
    containerEl.style.display = 'block';
    fitContainer();
  };
  imgEl.onerror = () => {
    setStatus(`⚠ スライド${n}の画像が見つかりません`, true);
  };
  imgEl.src = url;
  curSlideEl.textContent = n;
}

// =====================================================
// コンテナサイズ調整（アスペクト比維持）
// =====================================================
function fitContainer() {
  const asp = slideWidthPt / slideHeightPt;
  const avW = stageEl.clientWidth  - 48;
  const avH = stageEl.clientHeight - 48;
  let w = avW, h = avW / asp;
  if (h > avH) { h = avH; w = avH * asp; }
  containerEl.style.width  = `${w}px`;
  containerEl.style.height = `${h}px`;
  overlayEl.setAttribute('width',  w);
  overlayEl.setAttribute('height', h);
  overlayEl.setAttribute('viewBox', `0 0 ${w} ${h}`);
  // ポインターが表示中なら再描画
  if (pointerTarget) drawPointerSVG(pointerTarget, false);
  // ← 追加: chart-annotationも再描画
  if (_lastChartPt) drawChartAnnotation(_lastChartPt);
}

window.addEventListener('resize', fitContainer);

// =====================================================
// ポインター描画
// =====================================================

/**
 * SVGオーバーレイにポインター要素を描画する。
 * @param {object} target - { cx, cy, rx, ry, rw, rh, confidence, label } (比率座標)
 * @param {boolean} animate - 出現アニメーション付きか
 * @param {boolean} pulse   - 到達後パルスアニメーション付きか
 */
function drawPointerSVG(target, animate = true, pulse = false) {
  const W = parseFloat(overlayEl.getAttribute('width')  || containerEl.clientWidth);
  const H = parseFloat(overlayEl.getAttribute('height') || containerEl.clientHeight);

  const { cx, cy, rx, ry, rw, rh, confidence, label } = target;

  // 信頼度に応じた色を取得
  const col = CONF_COLOR[confidence] || CONF_COLOR.high;

  // ピクセル変換
  const prx = rx * W, pry = ry * H;
  const prw = rw * W, prh = rh * H;
  // レーザー点: 水平は左端から10%（行頭の•付近）、垂直は中央
  const pcx = prx + prw * 0.10;
  const pcy = pry + prh * 0.50;
  const laserR  = W * 0.006;   // コア（実際のレーザー点）
  const midR    = W * 0.012;   // 中間グロー
  const outerR  = W * 0.022;   // 外側グロー

  // 既存を削除（フェードアウト中のものも即時消去）
  const old = overlayEl.getElementById('pointer-group');
  if (old) old.remove();

  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.id = 'pointer-group';
  // CSS変数で色を注入
  g.style.setProperty('--ptr-color',     col.laser);
  g.style.setProperty('--ptr-highlight', col.highlight);
  g.style.setProperty('--ptr-shadow',    col.shadow);
  // transform-originをポインター中心に設定（出現アニメ用）
  g.style.transformOrigin = `${pcx}px ${pcy}px`;
  g.style.transformBox = 'fill-box';

  if (animate) g.classList.add('pointer-appear');
  if (pulse)   g.classList.add('pointer-pulse');

  // --- ハイライト矩形 ---
  const hi = mkEl('rect', {
    x: prx, y: pry, width: prw, height: prh,
    rx: 5, ry: 5,
    class: 'highlight-rect',
  });
  g.appendChild(hi);

  // --- ボーダー矩形 ---
  const bd = mkEl('rect', {
    x: prx + 1.5, y: pry + 1.5,
    width: prw - 3, height: prh - 3,
    rx: 4, ry: 4,
    class: 'border-rect',
  });
  g.appendChild(bd);

  // --- レーザー（外→内） ---
  g.appendChild(mkEl('circle', { cx: pcx, cy: pcy, r: outerR, class: 'laser-outer' }));
  g.appendChild(mkEl('circle', { cx: pcx, cy: pcy, r: midR,   class: 'laser-mid' }));
  g.appendChild(mkEl('circle', { cx: pcx, cy: pcy, r: laserR, class: 'laser-core', filter: 'url(#glow)' }));

  // --- ラベル ---
  if (label) {
    const FONT = 11, PAD = 4;
    const lblW = label.length * FONT * 0.56 + PAD * 2;
    const lblH = FONT + PAD * 2;
    const lblX = Math.min(prx, W - lblW - 4);
    const lblY = Math.max(0, pry - lblH - 3);
    g.appendChild(mkEl('rect', {
      x: lblX, y: lblY, width: lblW, height: lblH, rx: 3,
      class: 'pointer-label-bg',
    }));
    const txt = mkEl('text', {
      x: lblX + PAD, y: lblY + FONT + PAD - 2,
      class: 'pointer-label',
    });
    txt.textContent = label;
    g.appendChild(txt);
  }

  overlayEl.appendChild(g);
}

// ============================================================
// 図表内部アノテーション描画（4.2）
// ============================================================
let _lastChartPt = null;  // グローバル変数として追加

function drawChartAnnotation(chartPt) {
  _lastChartPt = chartPt; // 最新のチャートポイントを保存
  const W = parseFloat(overlayEl.getAttribute('width')  || containerEl.clientWidth);
  const H = parseFloat(overlayEl.getAttribute('height') || containerEl.clientHeight);

  // 既存のアノテーションを削除
  const old = overlayEl.getElementById('chart-annotation');
  if (old) old.remove();

  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.id = 'chart-annotation';
  g.style.setProperty('--ptr-color', '#00d4ff');  // シアン（ポインターの赤と区別）

  if (chartPt.draw_type === 'circle' && chartPt.abs_bbox_ratio) {
    const [rx, ry, rw, rh] = chartPt.abs_bbox_ratio;
    const px = rx * W, py = ry * H;
    const pw = rw * W, ph = rh * H;
    const cx = px + pw / 2, cy = py + ph / 2;
    const radiusX = pw / 2 + 8, radiusY = ph / 2 + 8;

    // 楕円の丸枠
    const ellipse = mkEl('ellipse', {
      cx, cy,
      rx: radiusX, ry: radiusY,
      fill: 'none',
      stroke: '#00d4ff',
      'stroke-width': 3,
      'stroke-dasharray': '6,3',
      opacity: 0.9,
      filter: 'url(#glow)',
    });
    g.appendChild(ellipse);

    // ラベル
    const lbl = mkEl('text', {
      x: cx,
      y: cy - radiusY - 6,
      'text-anchor': 'middle',
      fill: '#00d4ff',
      'font-size': 11,
      'font-family': 'monospace',
    });
    lbl.textContent = chartPt.target || '';
    g.appendChild(lbl);

  } else if (chartPt.draw_type === 'arrow' &&
             chartPt.abs_arrow_start && chartPt.abs_arrow_end) {
    const [sx, sy] = chartPt.abs_arrow_start;
    const [ex, ey] = chartPt.abs_arrow_end;
    const psx = sx * W, psy = sy * H;
    const pex = ex * W, pey = ey * H;

    // 矢印マーカー定義
    const defs = overlayEl.querySelector('defs') || (() => {
      const d = mkEl('defs', {}); overlayEl.prepend(d); return d;
    })();
    if (!defs.querySelector('#arrow-marker')) {
      const marker = mkEl('marker', {
        id: 'arrow-marker',
        markerWidth: 8, markerHeight: 8,
        refX: 6, refY: 3,
        orient: 'auto',
      });
      const markerPath = mkEl('path', {
        d: 'M0,0 L0,6 L8,3 z',
        fill: '#00d4ff',
      });
      marker.appendChild(markerPath);
      defs.appendChild(marker);
    }

    // 矢印線
    const line = mkEl('line', {
      x1: psx, y1: psy, x2: pex, y2: pey,
      stroke: '#00d4ff',
      'stroke-width': 3,
      'stroke-linecap': 'round',
      'marker-end': 'url(#arrow-marker)',
      opacity: 0.9,
      filter: 'url(#glow)',
    });
    g.appendChild(line);
  }

  // フェードイン
  g.style.opacity = '0';
  overlayEl.appendChild(g);
  requestAnimationFrame(() => {
    g.style.transition = 'opacity 0.4s ease';
    g.style.opacity = '1';
  });
}

/**
 * ポインターをフェードアウトして消す。
 * @param {boolean} instant - trueなら即時消去（スライド切り替え時など）
 */
function clearPointer(instant = false) {
  if (rafId)        { cancelAnimationFrame(rafId); rafId = null; }
  if (pulseTimerId) { clearTimeout(pulseTimerId); pulseTimerId = null; }
  if (fadeTimerId)  { clearTimeout(fadeTimerId);  fadeTimerId  = null; }

  // chart-annotationを常に消す（early returnの前に実行）
  const ann = overlayEl.getElementById('chart-annotation');
  if (ann) ann.remove();
  _lastChartPt = null;

  const g = overlayEl.getElementById('pointer-group');
  if (!g) {
    pointerTarget  = null;
    pointerCurrent = null;
    return;
  }

  pointerTarget  = null;
  pointerCurrent = null;

  if (instant) {
    g.remove();
    return;
  }

  // フェードアウトアニメーション後に削除
  g.classList.remove('pointer-appear', 'pointer-pulse');
  g.classList.add('pointer-fadeout');
  fadeTimerId = setTimeout(() => { g.remove(); fadeTimerId = null; }, 320);
}

function mkEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

// =====================================================
// ポインティング結果処理
// =====================================================
function handlePointingResult(data) {
  const conf      = data.confidence || 'none';
  const bboxR     = data.smartart_node_bbox_ratio || data.bbox_ratio;
  const text      = data.asr_text || '';
  const preview   = data.content_preview || '';
  const reason    = data.reason || '';
  const elemId    = data.element_id || '-';
  const chartPt   = data.chart_pointing;  // ← 追加

  addLogEntry({ text, conf, preview, reason, elemId });

  if (conf === 'none' || !bboxR) {
    clearPointer();
    return;
  }

  const [rx, ry, rw, rh] = bboxR;
  const cx = rx + rw / 2;
  const cy = ry + rh / 2;
  // chart_pointingがある場合はtargetをラベルに使う
  const shortLabel = chartPt && chartPt.target ? `${chartPt.target} [${conf}]` : (preview.length > 20 ? preview.slice(0, 20) + '…' : preview) + ` [${conf}]`;
  const target = { cx, cy, rx, ry, rw, rh, confidence: conf, label: shortLabel };

  // chart_pointing がある場合は追加アノテーションを描画
  if (chartPt && chartPt.draw_type !== 'none') {
    if (pointerCurrent) {
      if (pulseTimerId) { clearTimeout(pulseTimerId); pulseTimerId = null; }
      const g = overlayEl.getElementById('pointer-group');
      if (g) g.classList.remove('pointer-pulse', 'pointer-fadeout');
      animatePointer(pointerCurrent, target);
    } else {
      pointerTarget  = target;
      pointerCurrent = { ...target };
      drawPointerSVG(target, true, false);
    }
    // chart_pointing の描画（少し遅延させてメインポインターの後に表示）
    setTimeout(() => drawChartAnnotation(chartPt), 300);
    return;
  }

  // 通常ポインティング（従来通り）
  if (pointerCurrent) {
    if (pulseTimerId) { clearTimeout(pulseTimerId); pulseTimerId = null; }
    const g = overlayEl.getElementById('pointer-group');
    if (g) g.classList.remove('pointer-pulse', 'pointer-fadeout');
    animatePointer(pointerCurrent, target);
  } else {
    pointerTarget  = target;
    pointerCurrent = { ...target };
    drawPointerSVG(target, true, false);
    pulseTimerId = setTimeout(() => {
      const g = overlayEl.getElementById('pointer-group');
      if (g) g.classList.add('pointer-pulse');
      pulseTimerId = null;
    }, 700);
  }
}

/** 距離に応じてLERP速度を計算する */
function calcLerp(cur, to) {
  const dist = Math.sqrt(
    Math.pow(to.cx - cur.cx, 2) + Math.pow(to.cy - cur.cy, 2)
  );
  // dist が DIST_FAR 以上なら LERP_MAX、0に近づくほど LERP_MIN に近づく
  const t = Math.min(dist / DIST_FAR, 1.0);
  return LERP_MIN + (LERP_MAX - LERP_MIN) * t;
}

/** lerp補間でポインターを滑らかに移動させる */
function animatePointer(from, to) {
  if (rafId)        { cancelAnimationFrame(rafId); rafId = null; }
  if (pulseTimerId) { clearTimeout(pulseTimerId); pulseTimerId = null; }

  let cur = { ...from };

  function step() {
    const lerp = calcLerp(cur, to);

    cur.cx += (to.cx - cur.cx) * lerp;
    cur.cy += (to.cy - cur.cy) * lerp;
    cur.rx += (to.rx - cur.rx) * lerp;
    cur.ry += (to.ry - cur.ry) * lerp;
    cur.rw += (to.rw - cur.rw) * lerp;
    cur.rh += (to.rh - cur.rh) * lerp;
    cur.label      = to.label;
    cur.confidence = to.confidence;

    drawPointerSVG(cur, false, false);
    pointerCurrent = { ...cur };

    const dist = Math.sqrt(
      Math.pow(to.cx - cur.cx, 2) + Math.pow(to.cy - cur.cy, 2)
    );

    if (dist > 0.001) {
      rafId = requestAnimationFrame(step);
    } else {
      // 到達: 最終位置に確定してパルス開始
      pointerTarget  = { ...to };
      pointerCurrent = { ...to };
      rafId = null;
      drawPointerSVG(to, false, false);
      // 0.5秒後にパルスアニメーション開始
      pulseTimerId = setTimeout(() => {
        const g = overlayEl.getElementById('pointer-group');
        if (g) g.classList.add('pointer-pulse');
        pulseTimerId = null;
      }, 500);
    }
  }
  rafId = requestAnimationFrame(step);
}

// =====================================================
// ログエントリ追加
// =====================================================
function addLogEntry({ text, conf, preview, reason, elemId }) {
  const recId = ++evalCounter;
  const entry = document.createElement('div');
  entry.className = `log-entry ${conf}`;
  entry.dataset.recId = recId;

  const badge = `<span class="conf-badge conf-${conf}">${conf}</span>`;
  const previewTxt = preview
    ? `<div class="log-result">${escHtml(preview.slice(0, 40))} ${badge}</div>`
    : `<div class="log-result">— ${badge}</div>`;
  const reasonTxt = reason
    ? `<div class="log-reason">${escHtml(reason.slice(0, 80))}</div>`
    : '';

  // confidence が none 以外の場合のみ評価ボタンを表示
  const evalBtns = conf !== 'none' ? `
    <div class="eval-row">
      <button class="eval-btn correct" onclick="recordEval(${recId}, true, this)">✓ 正解</button>
      <button class="eval-btn wrong"   onclick="recordEval(${recId}, false, this)">✗ 不正解</button>
    </div>` : '';

  entry.innerHTML = `
    <div class="log-text">${escHtml(text.slice(0, 50))}</div>
    ${previewTxt}
    ${reasonTxt}
    ${evalBtns}
  `;

  // 評価レコードを追加（初期値: 未評価）
  if (conf !== 'none') {
    evalRecords.push({
      id: recId,
      timestamp: new Date().toISOString(),
      slide: currentSlide,
      text: text.slice(0, 100),
      elemId: elemId || '-',
      preview: (preview || '').slice(0, 60),
      conf,
      correct: null,   // null=未評価, true=正解, false=不正解
    });
  }

  logListEl.insertBefore(entry, logListEl.firstChild);

  while (logListEl.children.length > MAX_LOG) {
    logListEl.removeChild(logListEl.lastChild);
  }
}

/** 評価ボタンが押されたときの処理 */
function recordEval(recId, isCorrect, btnEl) {
  const rec = evalRecords.find(r => r.id === recId);
  if (!rec) return;

  rec.correct = isCorrect;

  // ボタンのスタイル更新
  const row = btnEl.closest('.eval-row');
  row.querySelectorAll('.eval-btn').forEach(b => {
    b.classList.remove('selected-correct', 'selected-wrong');
  });
  btnEl.classList.add(isCorrect ? 'selected-correct' : 'selected-wrong');

  updateAccuracyBar();
}

/** 精度サマリーを更新 */
/** 入力UI全体の有効/無効を切り替える */
function setInputEnabled(enabled) {
  asrInputEl.disabled   = !enabled;
  btnSend.disabled      = !enabled || isProcessing;
  // マイクボタンは常にブラウザASRとして使えるのでdisabledにしない
  // 待機中はラベルだけ変更
  if (enabled) {
    updateMicBtn();
  } else {
    micLabel.textContent = '準備中...';
    btnMic.className = '';
    btnMic.disabled = true;
    btnMic.style.opacity = '0.4';
  }
  // テキストエリアのplaceholderも変更
  asrInputEl.placeholder = enabled
    ? '発話テキストを入力して送信\n（Enter で送信）'
    : 'ASR準備中... しばらくお待ちください';
  // キーボードショートカットも無効化するためフラグ管理
  // マイクボタンのdisabled/opacityをリセット
  if (enabled) {
    btnMic.disabled = false;
    btnMic.style.opacity = '';
  }
  window._inputEnabled = enabled;
}

function updateAccuracyBar() {
  const evaluated = evalRecords.filter(r => r.correct !== null);
  const correct   = evaluated.filter(r => r.correct === true);
  const total     = evalRecords.length;

  const scoreEl  = document.getElementById('accuracy-score');
  const detailEl = document.getElementById('accuracy-detail');

  if (evaluated.length === 0) {
    scoreEl.textContent  = '—';
    detailEl.textContent = `評価待ち（${total}件ポインティング済み）`;
    return;
  }

  const pct = Math.round(correct.length / evaluated.length * 100);
  scoreEl.textContent  = `${pct}%`;
  scoreEl.style.color  = pct >= 80 ? '#3ddc84' : pct >= 60 ? '#ffd740' : '#ff4f6a';
  detailEl.textContent = `正解 ${correct.length}/${evaluated.length}件（未評価: ${total - evaluated.length}件）`;
}

/** 精度データをCSVでダウンロード */
function exportEvalCSV() {
  if (evalRecords.length === 0) {
    alert('まだ評価データがありません');
    return;
  }
  const header = 'id,timestamp,slide,text,element_id,preview,confidence,correct';
  const rows = evalRecords.map(r =>
    [r.id, r.timestamp, r.slide,
     `"${r.text.replace(/"/g,'""')}"`,
     r.elemId,
     `"${r.preview.replace(/"/g,'""')}"`,
     r.conf,
     r.correct === null ? 'unevaluated' : r.correct ? 'correct' : 'wrong'
    ].join(',')
  );
  const csv  = [header, ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `pointing_eval_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setStatus(msg, isErr = false) {
  statusEl.textContent = msg;
  statusEl.className   = isErr ? 'error' : '';
}

function updateSendBtn() {
  btnSend.disabled     = isProcessing;
  btnSend.textContent  = isProcessing ? '…' : '送信';
}

// =====================================================
// マイクASR制御
// =====================================================

async function checkAsrStatus() {
  try {
    const res  = await fetch('/api/asr/status');
    const data = await res.json();
    micEnabled = data.enabled;
    micActive  = data.running;
    // サーバー側ASRが無効でもブラウザASRは使えるのでボタンを有効化
    btnMic.classList.remove('disabled');
    updateMicBtn();
  } catch (e) {
    console.warn('[ASR] ステータス取得失敗:', e);
  }
}

function updateMicBtn() {
  // サーバー側マイク（--asr）が有効な場合
  if (micEnabled) {
    if (micActive) {
      btnMic.className = 'active';
      micLabel.textContent = '録音中 ■';
      btnMic.title = 'クリックでマイク停止（サーバー側）';
    } else {
      btnMic.className = '';
      micLabel.textContent = 'マイク開始 ▶';
      btnMic.title = 'クリックでマイク開始（サーバー側）';
    }
    return;
  }
  // ブラウザASRモード（ネットワーク越し）
  if (browserMicActive) {
    btnMic.className = 'active';
    micLabel.textContent = '録音中 ■';
    btnMic.title = 'クリックでマイク停止（ブラウザ）';
  } else {
    btnMic.className = '';
    micLabel.textContent = 'マイク開始 ▶';
    btnMic.title = 'クリックでマイク開始（ブラウザ）';
  }
}

function toggleMic() {
  if (micActive) {
    // サーバー側マイクOFF
    socket?.emit('asr_control', { action: 'stop' });
  } else if (micEnabled) {
    // サーバー側マイクON
    socket?.emit('asr_control', { action: 'start' });
  } else {
    // ブラウザASRのトグル
    if (browserMicActive) {
      stopBrowserASR();
    } else {
      startBrowserASR();
    }
  }
}

// =====================================================
// ブラウザASR（音声をサーバーのWhisperに送信）
// =====================================================

async function startBrowserASR() {
  if (browserMicActive) return;
  if (!window._inputEnabled) return;

  try {
    browserMediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    // ネイティブのサンプルレートで取得（ブラウザが16kHzを無視することがある）
    browserAudioCtx    = new AudioContext();
    const actualRate   = browserAudioCtx.sampleRate;
    console.log(`[BROWSER_ASR] AudioContext sampleRate: ${actualRate}Hz`);

    const source       = browserAudioCtx.createMediaStreamSource(browserMediaStream);

    // ScriptProcessorNodeで音声データを取得
    browserProcessor = browserAudioCtx.createScriptProcessor(4096, 1, 1);
    browserProcessor.onaudioprocess = (e) => {
      const chunk = e.inputBuffer.getChannelData(0);

      // 16kHzへのダウンサンプリング
      if (actualRate !== 16000) {
        const ratio    = actualRate / 16000;
        const outLen   = Math.round(chunk.length / ratio);
        const resampled = new Float32Array(outLen);
        for (let i = 0; i < outLen; i++) {
          resampled[i] = chunk[Math.round(i * ratio)];
        }
        browserAudioBuffer.push(resampled);
      } else {
        browserAudioBuffer.push(new Float32Array(chunk));
      }
    };

    source.connect(browserProcessor);
    browserProcessor.connect(browserAudioCtx.destination);

    browserMicActive = true;
    updateMicBtn();
    setStatus('🎤 ブラウザマイク録音中...');

    // 定期的にサーバーに送信
    browserChunkTimer = setInterval(sendBrowserAudioChunk, BROWSER_ASR_CHUNK_SEC * 1000);

  } catch (e) {
    setStatus(`⚠ マイクアクセス失敗: ${e.message}`, true);
    console.error('[BROWSER_ASR] マイクアクセス失敗:', e);
  }
}

function stopBrowserASR() {
  if (!browserMicActive) return;

  clearInterval(browserChunkTimer);
  browserChunkTimer = null;

  if (browserProcessor) {
    browserProcessor.disconnect();
    browserProcessor = null;
  }
  if (browserAudioCtx) {
    browserAudioCtx.close();
    browserAudioCtx = null;
  }
  if (browserMediaStream) {
    browserMediaStream.getTracks().forEach(t => t.stop());
    browserMediaStream = null;
  }

  browserAudioBuffer = [];
  browserMicActive   = false;
  updateMicBtn();
  setStatus('⏹ ブラウザマイク停止');
}

function sendBrowserAudioChunk() {
  if (!browserMicActive || browserAudioBuffer.length === 0 || !socket?.connected) return;

  // バッファを結合
  const totalLen = browserAudioBuffer.reduce((s, c) => s + c.length, 0);
  const merged   = new Float32Array(totalLen);
  let offset = 0;
  for (const chunk of browserAudioBuffer) {
    merged.set(chunk, offset);
    offset += chunk.length;
  }
  browserAudioBuffer = [];

  // Float32Array → base64（大きな配列対応）
  const bytes = new Uint8Array(merged.buffer);
  let b64 = '';
  const CHUNK = 8192;
  for (let i = 0; i < bytes.length; i += CHUNK) {
    b64 += String.fromCharCode(...bytes.subarray(i, i + CHUNK));
  }
  b64 = btoa(b64);

  console.log(`[BROWSER_ASR] 送信: ${merged.length}サンプル, ${bytes.length}bytes`);
  socket.emit('audio_chunk', {
    audio:     b64,
    slide_num: currentSlide,
  });
}

function showTranscript(text) {
  transcriptEl.textContent = `🎤 ${text}`;
  transcriptEl.classList.add('fresh');
  // 5秒後にフェードアウト
  clearTimeout(transcriptTimer);
  transcriptTimer = setTimeout(() => {
    transcriptEl.classList.remove('fresh');
    transcriptEl.textContent = '—';
  }, 5000);
}

// =====================================================
// テキスト送信
// =====================================================
function sendASRText() {
  const text = asrInputEl.value.trim();
  if (!text || isProcessing || !socket?.connected) return;
  if (!window._inputEnabled) return;

  const t0 = performance.now();
  isProcessing = true;
  updateSendBtn();
  setStatus('🤔 送信中...');

  socket.emit('asr_text', { text, slide_num: currentSlide });
}

// =====================================================
// スライド切り替え
// =====================================================
function goToSlide(n) {
  n = Math.max(1, Math.min(totalSlides || 1, n));
  if (n === currentSlide) return;
  socket?.emit('change_slide', { slide_num: n });
}

// =====================================================
// イベントリスナー
// =====================================================

btnMic.addEventListener('click', toggleMic);

// =====================================================
// PPTXアップロード
// =====================================================

function showUploadProgress(state, message, progress) {
  uploadProgress.style.display = 'block';
  uploadMessage.textContent    = message;
  progressFill.style.width     = `${progress}%`;
  progressFill.className       = 'progress-fill';
  if (state === 'error') progressFill.classList.add('error');
  if (state === 'done')  progressFill.classList.add('done');
}

async function uploadPptxFile(file) {
  if (!file || !file.name.toLowerCase().endsWith('.pptx')) {
    alert('.pptx ファイルを選択してください');
    return;
  }

  showUploadProgress('processing', `📤 アップロード中: ${file.name}`, 5);

  const formData = new FormData();
  formData.append('file', file);

  try {
    const res = await fetch('/api/upload/pptx', {
      method: 'POST',
      body: formData,
    });
    const data = await res.json();

    if (!res.ok) {
      showUploadProgress('error', `❌ ${data.error || 'アップロード失敗'}`, 0);
      return;
    }

    showUploadProgress('processing', `⚙️ セットアップ中... (しばらくお待ちください)`, 15);
    setStatus('⚙️ PPTXを処理中...');

  } catch (e) {
    showUploadProgress('error', `❌ 通信エラー: ${e.message}`, 0);
  }
}

// ファイル選択
fileInput.addEventListener('change', (e) => {
  if (e.target.files[0]) uploadPptxFile(e.target.files[0]);
});

// ドラッグ&ドロップ
uploadZone.addEventListener('dragover',  (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', ()  => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop',      (e) => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) uploadPptxFile(file);
});

btnFocus.addEventListener('click', toggleFocusMode);
document.addEventListener('keydown', (e) => {

  if (e.key === 'f' || e.key === 'F') toggleFocusMode();
});

  document.body.classList.toggle('focus-mode');

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    // stageエリアを全画面に
    stageEl.requestFullscreen().catch(e => console.warn('fullscreen error:', e));
  } else {
    document.exitFullscreen();
  }
}

btnFullscreen.addEventListener('click', toggleFullscreen);

// Fキーでも全画面切り替え
document.addEventListener('keydown', (e) => {
  if (e.target === asrInputEl) return;
  if (e.key === 'f' || e.key === 'F') toggleFullscreen();
});

document.addEventListener('fullscreenchange', () => {
  if (document.fullscreenElement) {
    btnFullscreen.textContent = '✕ 全画面解除';

  }
});

    sendASRText();
  }
});

  if (e.key === 'ArrowLeft')  goToSlide(currentSlide - 1);
  if (e.key === 'ArrowRight') goToSlide(currentSlide + 1);
